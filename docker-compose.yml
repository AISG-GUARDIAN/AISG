# AISG 안전 체크 시스템 — Docker Compose 설정
# backend + frontend를 단일 이미지로 빌드한다 (FastAPI가 정적 파일 서빙)

services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8001:8000"
    volumes:
      # SQLite DB 파일 영속화
      - ./data:/app/data
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite:///./data/safety_check.db
    restart: unless-stopped
