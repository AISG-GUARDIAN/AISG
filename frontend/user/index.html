<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Safe Guardian — Worker Check-In</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 플래시 오버레이 -->
  <div id="flash-overlay"></div>

  <div id="app">

    <!-- 헤더 -->
    <header id="header">
      <div class="header-logo">
        <span class="header-icon">🚦</span>
        <div>
          <div class="header-title">AI SAFE GUARDIAN</div>
          <div class="header-sub">근로자 체크인 · WORKER CHECK-IN</div>
        </div>
      </div>
      <button id="btn-reset" class="btn-ghost" style="display:none">← 처음으로</button>
    </header>

    <!-- 메인 콘텐츠 -->
    <main id="main">

      <!-- ① 언어 선택 -->
      <section id="screen-lang" class="screen active fade-in">
        <h1 class="title-xl">DAILY CHECK-IN</h1>
        <p class="sub-text" style="margin-bottom:48px">언어를 선택하세요 · Select Your Language</p>
        <div id="lang-grid" class="lang-grid"></div>
        <p class="caption" style="margin-top:36px">개인정보 비저장 · PASS/FAIL 카운트만 기록</p>
      </section>

      <!-- ② PIN 입력 -->
      <section id="screen-pin" class="screen">
        <div id="pin-flag" class="flag-xl"></div>
        <p id="pin-prompt-native" class="bilingual-native"></p>
        <p id="pin-prompt-ko"     class="bilingual-ko"></p>

        <div id="pin-dots" class="pin-dots"></div>

        <div class="pin-masking">
          <span class="masking-label">연락처</span>
          <span class="masking-dots">●●●-●●●●-</span>
          <span id="pin-display" class="masking-input">○○○○</span>
        </div>

        <div id="numpad" class="numpad"></div>

        <div class="row-btns" style="margin-top:28px">
          <button id="btn-back-pin" class="btn-outline">← 뒤로</button>
          <button id="btn-confirm-pin" class="btn-primary" disabled>0 / 4 자리 입력 중</button>
        </div>
        <p class="caption" style="margin-top:20px">입력 정보는 저장되지 않습니다</p>
      </section>

      <!-- ③ 카메라 준비 -->
      <section id="screen-ready" class="screen">
        <div id="ready-badge" class="pin-badge"></div>
        <p id="ready-greeting-native" class="bilingual-native" style="margin-top:14px"></p>
        <p id="ready-greeting-ko"     class="bilingual-ko"></p>

        <div class="cam-view" style="margin:20px 0" id="cam-view-box">
          <!-- 카메라 로딩 중 -->
          <div id="cam-loading" class="cam-placeholder">
            <div class="cam-icon">📷</div>
            <div class="cam-label">카메라 연결 중...</div>
          </div>
          <!-- 카메라 오류 -->
          <div id="cam-error" class="cam-placeholder" style="display:none">
            <div class="cam-icon">⚠️</div>
            <div class="cam-label" id="cam-error-msg">카메라 접근 불가</div>
          </div>
          <!-- 라이브 프리뷰 -->
          <video id="cam-video" autoplay playsinline muted style="display:none"></video>
          <canvas id="cam-canvas" style="display:none"></canvas>
          <div class="corner tl"></div>
          <div class="corner tr"></div>
          <div class="corner bl"></div>
          <div class="corner br"></div>
        </div>

        <div class="ppe-row">
          <div class="ppe-card">
            <div class="ppe-emoji">⛑️</div>
            <div id="ready-helmet-native" class="ppe-name"></div>
            <div id="ready-helmet-ko"     class="ppe-name-ko"></div>
            <div id="ready-wear-native"   class="ppe-check"></div>
            <div id="ready-wear-ko"       class="ppe-check-ko"></div>
          </div>
          <div class="ppe-card">
            <div class="ppe-emoji">🦺</div>
            <div id="ready-vest-native" class="ppe-name"></div>
            <div id="ready-vest-ko"     class="ppe-name-ko"></div>
            <div id="ready-wear2-native" class="ppe-check"></div>
            <div id="ready-wear2-ko"    class="ppe-check-ko"></div>
          </div>
        </div>

        <button id="btn-start-scan" class="btn-primary btn-lg" style="margin-top:24px">
          <span id="start-native"></span>
          <span id="start-ko" class="btn-sub"></span>
        </button>
      </section>

      <!-- ④ 스캔 중 -->
      <section id="screen-scanning" class="screen">
        <div style="text-align:center; margin-bottom:22px">
          <div id="scan-label-native" class="scan-label"></div>
          <div id="scan-label-ko"     class="scan-label-ko"></div>
        </div>

        <div class="scan-view">
          <div class="scan-bg"></div>
          <div class="person-silhouette">
            <div class="person-head"></div>
            <div class="person-body"></div>
          </div>
          <div id="box-helmet" class="ppe-box-overlay helmet">
            <span id="box-helmet-label" class="box-label"></span>
          </div>
          <div id="box-vest" class="ppe-box-overlay vest">
            <span id="box-vest-label" class="box-label"></span>
          </div>
          <div id="scan-line" class="scan-line"></div>
          <div class="corner tl"></div>
          <div class="corner tr"></div>
          <div class="corner bl"></div>
          <div class="corner br"></div>
        </div>

        <div class="progress-wrap">
          <div class="progress-top">
            <span class="prog-label">PPE 감지 중</span>
            <span id="prog-pct" class="prog-pct">0%</span>
          </div>
          <div class="progress-track">
            <div id="progress-bar" class="progress-fill" style="width:0%"></div>
          </div>
        </div>

        <div class="ppe-status-list">
          <div id="status-helmet" class="ppe-status scanning">
            <span class="status-icon">⏳</span>
            <div>
              <div id="status-helmet-native" class="status-name"></div>
              <div id="status-helmet-ko"     class="status-ko"></div>
            </div>
            <span class="status-tag">감지중...</span>
          </div>
          <div id="status-vest" class="ppe-status scanning">
            <span class="status-icon">⏳</span>
            <div>
              <div id="status-vest-native" class="status-name"></div>
              <div id="status-vest-ko"     class="status-ko"></div>
            </div>
            <span class="status-tag">감지중...</span>
          </div>
        </div>
      </section>

      <!-- ⑤ PASS -->
      <section id="screen-pass" class="screen">
        <div class="result-card pass-card scale-in">
          <div class="result-emoji">✅</div>
          <div class="result-title pass-title">PASS</div>
          <div id="pass-ppe-info" class="result-ppe-info"></div>
          <div id="pass-pin-badge" class="result-pin-badge"></div>
          <div class="tts-box pass-tts">
            <div id="pass-tts-label" class="tts-label pass-tts-label"></div>
            <div id="pass-msg-native" class="tts-msg"></div>
            <div id="pass-msg-ko"     class="tts-msg-ko"></div>
          </div>
          <!-- 자동 초기화 카운트다운 -->
          <div class="auto-reset-bar">
            <div id="auto-reset-fill" class="auto-reset-fill"></div>
          </div>
          <p id="auto-reset-label" class="caption" style="margin-bottom:12px"></p>
          <button id="btn-next-worker" class="btn-pass btn-lg">
            <span id="next-native"></span>
            <span id="next-ko" class="btn-sub"></span>
          </button>
        </div>
      </section>

      <!-- ⑥ FAIL -->
      <section id="screen-fail" class="screen">
        <div class="result-card fail-card scale-in">
          <div class="result-emoji">⚠️</div>
          <div class="result-title fail-title">FAIL</div>
          <div id="fail-pin-badge" class="result-pin-badge fail-badge"></div>

          <div class="tts-box fail-tts">
            <div id="fail-tts-label" class="tts-label fail-tts-label"></div>
            <div id="fail-msg-native" class="tts-msg"></div>
            <div id="fail-msg-ko"     class="tts-msg-ko"></div>
          </div>

          <div id="fail-ppe-list" class="ppe-status-list"></div>

          <div class="guide-box">
            <div id="guide-label" class="guide-title"></div>
            <ol id="guide-list" class="guide-list"></ol>
          </div>

          <!-- 재시도 (1~2회) -->
          <button id="btn-retry" class="btn-retry btn-lg">
            <span id="retry-native"></span>
            <span id="retry-ko" class="btn-sub"></span>
          </button>

          <!-- 3회 초과 에스컬레이션 -->
          <div id="escalation-box" class="escalation-box" style="display:none">
            <p id="escalation-native" class="escalation-text"></p>
            <p id="escalation-ko"     class="escalation-ko"></p>
            <button id="btn-reset-fail" class="btn-ghost-lg">
              <span id="reset-native"></span>
            </button>
          </div>
        </div>
      </section>

    </main>

    <!-- 푸터 -->
    <footer id="footer">
      개인정보 비저장 · PASS/FAIL COUNT ONLY · SESAC 2026
    </footer>

  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
